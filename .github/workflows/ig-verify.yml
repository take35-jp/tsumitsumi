name: IG Verify (diagnostic)

# Instagram 投稿の実体確認（診断用・手動実行のみ）。
# トークンが指すアカウントの username と直近メディアの permalink を表示する。
on:
  workflow_dispatch:
    inputs:
      media_id:
        description: "確認したい media id（任意）"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify Instagram media
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node local-tools/social/verify-instagram.js ${{ inputs.media_id }}
