<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ツミツミ</title>
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ツミツミ" />
    <meta name="theme-color" content="#1a1a1a" />
    <!-- ダークモード初期適用（React 描画前に同期実行してフラッシュ防止） -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem("tsumitsumi_theme");
          var theme;
          if (saved === "dark" || saved === "light") {
            theme = saved;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          } else {
            theme = "light";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <style>
      /* ダークモード：filter は :root(html) に適用する。body に当てると body が
         position:fixed 要素の包含ブロックになり、body が viewport より長い場合に
         モーダルが下端に飛ぶ（html はビューポート基準なので問題なし）。 */
      :root[data-theme="dark"] {
        filter: invert(1) hue-rotate(180deg);
        background: #fafafa;
      }
      :root[data-theme="dark"] img,
      :root[data-theme="dark"] video,
      :root[data-theme="dark"] iframe {
        filter: invert(1) hue-rotate(180deg);
      }
    </style>
    <!-- ZBar WASM 事前読み込み -->
    <script type="module">
      (async () => {
        try {
          const mod = await import('https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.11.0/dist/index.js');
          window.zbarWasm = mod;
          window.__zbarReady = true;
          window.dispatchEvent(new Event('zbar-ready'));
        } catch(e) {
          window.__zbarError = String(e);
          window.__zbarReady = false;
          window.dispatchEvent(new Event('zbar-error'));
        }
      })();
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3STS3L23VS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-3STS3L23VS');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
